openapi: 3.0.0
info:
  title: Interactive Digit Detector API
  version: 1.0.0
paths:
  /predict:
    post:
      summary: Predict a digit from an image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DigitDrawing'
      responses:
        '200':
          description: Successful prediction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResult'
components:
  schemas:
    DigitDrawing:
      type: object
      properties:
        image_data:
          type: string
          format: base64
          description: Base64 encoded 28x28 grayscale image data.
    PredictionResult:
      type: object
      properties:
        digit:
          type: integer
          description: The predicted digit (0-9).
